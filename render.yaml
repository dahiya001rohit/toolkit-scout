# Render blueprint: deploys the FastAPI backend as a free web service.
# GROQ_API_KEY is set in the Render dashboard (sync: false = never in git).
services:
  - type: web
    name: toolkit-scout
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
